kind = "mobile"
previewPath = "/"
title = "PetSnap Health Checker"
version = "1.0.0"
id = "artifacts/petsnap"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 23491
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/petsnap run dev"

[services.env]
PORT = "23491"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/petsnap", "run", "build"]
run = ["pnpm", "--filter", "@workspace/petsnap", "run", "serve"]
